<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Weather forecast</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/site.css}"/>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}"/>
</head>
<body>
<div class="page">
    <div class="sidebar">
        <div class="top-row ps-3 navbar navbar-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">Weather App</a>
            </div>
        </div>
        <nav class="flex-column nav-scrollable">
            <div class="nav-item px-3">
                <a class="nav-link active" href="/">
                    <span class="oi oi-home" aria-hidden="true"></span> Home
                </a>
            </div>
        </nav>
    </div>

    <main>
        <div class="top-row px-4">
            <a href="https://spring.io/" target="_blank">About</a>
        </div>

        <article class="content px-4">
            <h1>Weather forecast</h1>
            <p>This component demonstrates fetching data from a service.</p>

            <div th:if="${forecasts == null}">
                <p><em>Loading...</em></p>
            </div>

            <table class="table" th:if="${forecasts != null}">
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Temp. (C)</th>
                    <th>Temp. (F)</th>
                    <th>Summary</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="forecast : ${forecasts}">
                    <td th:text="${forecast.date()}"></td>
                    <td th:text="${forecast.temperatureC()}"></td>
                    <td th:text="${forecast.temperatureF()}"></td>
                    <td th:text="${forecast.summary()}"></td>
                </tr>
                </tbody>
            </table>
        </article>
    </main>
</div>
</body>
</html>
